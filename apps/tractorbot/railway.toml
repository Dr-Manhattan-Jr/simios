[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/tractorbot/Dockerfile"

[deploy]
# Long-polling worker — no HTTP port, no healthcheck.
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
# Telegram only allows ONE consumer of getUpdates per bot token. If the
# old container overlaps with the new one during a rolling deploy, both
# poll → Telegram 409 → one dies. overlapSeconds=0 forces Railway to
# stop the old replica before starting the new one. Brief downtime
# during deploys, but no 409 crashes.
overlapSeconds = 0
