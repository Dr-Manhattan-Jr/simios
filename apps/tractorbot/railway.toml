[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/tractorbot/Dockerfile"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
# Tiny HTTP server in the bot serves /health (200 once long-poll is up).
# Lets Railway confirm the bot is actually working rather than just
# "process started"; turns flaky deploy detection into deterministic.
healthcheckPath = "/health"
healthcheckTimeout = 60
# Telegram only allows ONE consumer of getUpdates per bot token. If the
# old container overlaps with the new one during a rolling deploy, both
# poll → Telegram 409 → one dies. overlapSeconds=0 forces Railway to
# stop the old replica before starting the new one. Brief downtime
# during deploys, but no 409 crashes.
overlapSeconds = 0
